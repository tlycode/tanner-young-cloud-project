<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shop{% endblock %}</title>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 0 auto; padding: 1rem; }
        nav { display: flex; gap: 1rem; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid #ddd; margin-bottom: 1.5rem; }
        nav a { text-decoration: none; color: #333; }
        nav a:hover { text-decoration: underline; }
        nav .spacer { flex: 1; }
        .flash { padding: 0.5rem 1rem; margin-bottom: 1rem; border-radius: 4px; }
        .flash.error { background: #fee; color: #c00; }
        .flash.success { background: #efe; color: #060; }
    </style>
</head>
<body>
    <nav>
        <a href="{{ url_for('main.index') }}"><strong>Shop</strong></a>
        <span class="spacer"></span>
        {% if current_user.is_authenticated %}
            <span>{{ current_user.email }}</span>
            <a href="{{ url_for('auth.logout') }}">Logout</a>
        {% else %}
            <a href="{{ url_for('auth.login') }}">Login</a>
            <a href="{{ url_for('auth.register') }}">Register</a>
        {% endif %}
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</body>
</html>
