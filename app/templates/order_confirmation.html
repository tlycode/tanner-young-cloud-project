{% extends "base.html" %}
{% block title %}Order Confirmed{% endblock %}
{% block content %}
    <div style="text-align: center; padding: 2rem 0;">
        <div style="font-size: 3rem;">&#9989;</div>
        <h1>Thank you for your order!</h1>
        <p style="color: #555;">Your mock order <strong>{{ order_number }}</strong> has been placed.</p>
        <p style="color: #555;">Total charged (not really): <strong>${{ "%.2f"|format(total) }}</strong></p>
        <a href="{{ url_for('main.index') }}"
           style="display: inline-block; margin-top: 1.5rem; padding: 0.6rem 1.2rem; background: #222; color: #fff; text-decoration: none; border-radius: 4px;">
            Continue Shopping
        </a>
    </div>
{% endblock %}
