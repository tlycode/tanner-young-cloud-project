{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
    <h1>Reset Password</h1>
    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" style="max-width: 360px;">
        <div style="margin-bottom: 1rem;">
            <label for="password">New Password</label><br>
            <input type="password" id="password" name="password" required style="width: 100%; padding: 0.4rem; margin-top: 0.25rem;">
        </div>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit">Reset Password</button>
    </form>
{% endblock %}
