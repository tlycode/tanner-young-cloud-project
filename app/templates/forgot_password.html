{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
    <h1>Forgot Password</h1>
    <p style="max-width: 360px;">Enter your account email and we'll log a password reset link.</p>
    <form method="POST" action="{{ url_for('auth.forgot_password') }}" style="max-width: 360px;">
        <div style="margin-bottom: 1rem;">
            <label for="email">Email</label><br>
            <input type="email" id="email" name="email" required style="width: 100%; padding: 0.4rem; margin-top: 0.25rem;">
        </div>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit">Send Reset Link</button>
    </form>
    <p style="margin-top: 1rem;"><a href="{{ url_for('auth.login') }}">Back to login</a></p>
{% endblock %}
