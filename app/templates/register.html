{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
    <h1>Register</h1>
    <form method="POST" action="{{ url_for('auth.register') }}" style="max-width: 360px;">
        <div style="margin-bottom: 1rem;">
            <label for="email">Email</label><br>
            <input type="email" id="email" name="email" required style="width: 100%; padding: 0.4rem; margin-top: 0.25rem;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label for="password">Password</label><br>
            <input type="password" id="password" name="password" required style="width: 100%; padding: 0.4rem; margin-top: 0.25rem;">
        </div>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit">Register</button>
    </form>
    <p style="margin-top: 1rem;">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
{% endblock %}
